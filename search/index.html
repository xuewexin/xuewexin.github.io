<div id="aplayer"></div>
<script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>

<script>
const staticDir = "https://xuewexin.github.io/" +'music/';
const songs =[
    '走马-曲肖冰',
    'OverYou-Daughtry',
    '烟花易冷-周杰伦',
    '牵手-苏芮',
    '一笑江湖-闻人听書',
    '循迹-王子健',
    '琥珀-简单对话ALittle Conversation',
    '柏林之声-晓雁'
];
let audios =[];
songs.forEach((item)=>{
      const songInfo =item.split('-');
      audios.push({
        name: songInfo[0],
        artist:songInfo[1],
        url: staticDir+item+'/song.mp3',
        cover: staticDir+item +'/cover.jpg', 
        lrc: staticDir +item+'/lrc.lrc'
      });
})


const ap = new APlayer({
    container: document.getElementById('aplayer'),
    fixed: true,
    listMaxHeight: '90px',
    lrcType: 3,
    audio: audios
});




     window.onbeforeunload = () => {
        
        const playInfo = {
            index: ap.list.index,
            currentTime: ap.audio.currentTime,
            paused: ap.paused
        };
        localStorage.setItem("playInfo", JSON.stringify(playInfo));
    };

    

    window.onload = () => {
        
        const playInfo = JSON.parse(localStorage.getItem("playInfo"));
        if (!playInfo) {
            return;
        }
        
        ap.list.switch(playInfo.index);
        
        setTimeout(() => {
            
            ap.seek(playInfo.currentTime);
            
            if (!playInfo.paused) {
                ap.play()
            }
        }, 500);
    };
</script>

<script>

pjax.handleResponse = function(responseText, request, href, options) {

        let newDom = new DOMParser().parseFromString(responseText, 'text/html');
        let bodyClass = newDom.body.className;
        document.body.setAttribute("class", bodyClass);
        pjax._handleResponse(responseText, request, href, options);
    }
}

topbar.config({
    barColors: {
        '0': 'rgba(255, 255, 255, 1)',

    }
})

document.addEventListener('pjax:send', () => {
    topbar.show();
})


function reloadGiscus() {
    var containers = document.querySelectorAll('.giscus');
    containers.forEach(function(div) {
        
        if (div.querySelector('iframe.giscus-frame')) return;

        
        var oldScript = div.querySelector('script[src*="giscus.app"]');
        if (oldScript) oldScript.remove();

        
        var script = document.createElement('script');
        script.src = 'https://giscus.app/client.js';
        script.setAttribute('data-repo', 'xuewexin/xuewexin.github.io');
        script.setAttribute('data-repo-id', 'R_kgDONXOLMg');
        script.setAttribute('data-category', 'Announcements');
        script.setAttribute('data-category-id', 'DIC_kwDONXOLMs4ClmhN');
        script.setAttribute('data-mapping', 'pathname');
        script.setAttribute('data-strict', '0');
        script.setAttribute('data-reactions-enabled', '1');
        script.setAttribute('data-emit-metadata', '0');
        script.setAttribute('data-input-position', 'top');
        script.setAttribute('data-theme', document.documentElement.dataset.scheme === 'dark' ? 'dark_dimmed' : 'light');
        script.setAttribute('data-lang', 'zh-CN');
        script.crossOrigin = 'anonymous';
        script.async = true;
        div.appendChild(script);
    });

    
    document.querySelectorAll('iframe.giscus-frame').forEach(function(frame) {
        if (!frame.closest('.giscus')) {
            frame.remove();
        }
    });
}

document.addEventListener('pjax:complete', () => {
    window.Stack.init();
    topbar.hide();
    reloadGiscus();
})
</script>

    }
  }
</style>

<script>
(function() {
  var btn = document.getElementById('back-to-top');
  var ticking = false;

  function updateVisibility() {
    if (window.scrollY > 400) {
      btn.classList.add('visible');
    } else {
      btn.classList.remove('visible');
    }
  }

  window.addEventListener('scroll', function() {
    if (!ticking) {
      window.requestAnimationFrame(function() {
        updateVisibility();
        ticking = false;
      });
      ticking = true;
    }
  });

  btn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>
